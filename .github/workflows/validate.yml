name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python3 skill/gpt-language-tutor/scripts/validate_repo.py
      - run: python3 -m unittest discover -s tests -v

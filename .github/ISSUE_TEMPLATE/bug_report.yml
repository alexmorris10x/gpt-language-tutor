name: Bug report
description: Report a reproducible repository or tutor-workflow problem.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include learner records, voice transcripts, credentials, or vulnerability details.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Codex version or environment and repository commit.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

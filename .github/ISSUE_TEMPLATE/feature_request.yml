name: Feature request
description: Propose a focused tutor or curriculum improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Learning problem
      description: What learner problem should this solve?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or rationale
      description: What observation or teaching principle supports this change?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
